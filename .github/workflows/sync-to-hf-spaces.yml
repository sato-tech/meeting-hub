name: Sync to Hugging Face Spaces

# main / feat/draft ブランチに push したとき、HF Spaces にミラーする。
# README に HF Spaces 用 frontmatter を動的に注入してから push する
# （GitHub 側の README はそのまま、HF Spaces 側のみフロントマター付きで配布）。
#
# 必要な repo secrets:
#   HF_USERNAME    — Hugging Face のユーザー名（例: sato-tech）
#   HF_TOKEN       — write 権限の HF アクセストークン
#                    https://huggingface.co/settings/tokens で発行
#   HF_SPACE_NAME  — Space リポ名（例: meeting-hub）
#   HF_SPACE_OWNER — （任意）Space の owner。組織 Space の場合に指定

on:
  push:
    branches: [main, feat/draft]
  workflow_dispatch:        # 手動実行も可能（ブランチを選べる）

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Inject HF Spaces frontmatter into README
        run: |
          cat > README_HF.md <<'EOF'
          ---
          title: meeting-hub
          emoji: 🎙️
          colorFrom: indigo
          colorTo: purple
          sdk: streamlit
          sdk_version: "1.35.0"
          app_file: web/streamlit_app.py
          pinned: false
          license: mit
          short_description: 文字起こし → 話者分離 → AI 議事録抽出（Whisper + pyannote + Claude）
          ---

          EOF
          cat README.md >> README_HF.md
          mv README_HF.md README.md

      - name: Push to Hugging Face Spaces
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
          HF_SPACE_OWNER: ${{ secrets.HF_SPACE_OWNER }}
        run: |
          if [ -z "$HF_USERNAME" ] || [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_NAME" ]; then
            echo "::error::Required secrets not set: HF_USERNAME / HF_TOKEN / HF_SPACE_NAME"
            exit 1
          fi
          SPACE_OWNER="${HF_SPACE_OWNER:-$HF_USERNAME}"
          HF_SPACE_URL="https://huggingface.co/spaces/${SPACE_OWNER}/${HF_SPACE_NAME}"
          HF_GIT_REMOTE="https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${SPACE_OWNER}/${HF_SPACE_NAME}"

          # 事前検証: Space が存在しない / owner が違う場合はここで明示的に失敗させる
          status="$(curl -s -o /dev/null -w '%{http_code}' "$HF_SPACE_URL" || true)"
          if [ "$status" != "200" ]; then
            echo "::error::HF Space not found or not accessible: ${HF_SPACE_URL} (status=${status})"
            echo "::error::Check HF_SPACE_OWNER/HF_SPACE_NAME and visibility settings."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "ci: inject HF Spaces frontmatter" || echo "no changes"
          git remote remove hf 2>/dev/null || true
          git remote add hf "$HF_GIT_REMOTE"
          # HF Spaces に強制 push（main ブランチを上書き）
          git push --force hf HEAD:main
