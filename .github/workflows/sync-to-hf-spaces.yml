name: Sync to Hugging Face Spaces

# main / feat/draft ブランチに push したとき、HF Spaces にミラーする。
# README に HF Spaces 用 frontmatter を動的に注入してから push する
# （GitHub 側の README はそのまま、HF Spaces 側のみフロントマター付きで配布）。
#
# 必要な repo secrets:
#   HF_USERNAME    — Hugging Face のユーザー名（例: sato-tech）
#   HF_TOKEN       — write 権限の HF アクセストークン
#                    https://huggingface.co/settings/tokens で発行
#   HF_SPACE_NAME  — Space リポ名（例: meeting-hub）
#   HF_SPACE_OWNER — （任意）Space の owner。組織 Space の場合に指定

on:
  push:
    branches: [main, feat/draft]
  workflow_dispatch:        # 手動実行も可能（ブランチを選べる）

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Inject HF Spaces frontmatter into README
        run: |
          cat > README_HF.md <<'EOF'
          ---
          title: meeting-hub
          emoji: 🎙️
          colorFrom: indigo
          colorTo: purple
          sdk: streamlit
          sdk_version: "1.35.0"
          app_file: web/streamlit_app.py
          pinned: false
          license: mit
          short_description: 文字起こし → 話者分離 → AI 議事録抽出（Whisper + pyannote + Claude）
          ---

          EOF
          cat README.md >> README_HF.md
          mv README_HF.md README.md

      - name: Push to Hugging Face Spaces
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
          HF_SPACE_OWNER: ${{ secrets.HF_SPACE_OWNER }}
        run: |
          set -uo pipefail

          if [ -z "${HF_USERNAME:-}" ] || [ -z "${HF_TOKEN:-}" ] || [ -z "${HF_SPACE_NAME:-}" ]; then
            echo "::error::Required secrets not set: HF_USERNAME / HF_TOKEN / HF_SPACE_NAME"
            exit 1
          fi
          SPACE_OWNER="${HF_SPACE_OWNER:-$HF_USERNAME}"
          SPACE_PATH="spaces/${SPACE_OWNER}/${HF_SPACE_NAME}"
          # token 部分はマスクされるよう ::add-mask:: 経由で隠す
          echo "::add-mask::${HF_TOKEN}"
          # 認証は git basic auth ではなく oauth2 形式の方が HF 側で安定する
          HF_GIT_REMOTE="https://oauth2:${HF_TOKEN}@huggingface.co/${SPACE_PATH}"

          echo "==> target: https://huggingface.co/${SPACE_PATH}"

          # 1) トークン自体の有効性と write 権限を HF API で事前検証
          WHOAMI_HTTP=$(curl -sS -o whoami.json -w '%{http_code}' \
            -H "Authorization: Bearer ${HF_TOKEN}" \
            https://huggingface.co/api/whoami-v2 || echo 000)
          if [ "${WHOAMI_HTTP}" != "200" ]; then
            echo "::error::HF whoami-v2 failed (HTTP ${WHOAMI_HTTP}). Token is invalid or expired."
            cat whoami.json || true
            exit 1
          fi
          # auth.accessToken.role が 'write' / 'fineGrained'(write 権限付き) かチェック
          TOKEN_ROLE=$(python3 -c 'import json,sys;d=json.load(open("whoami.json"));a=d.get("auth",{}).get("accessToken",{});print(a.get("role","")) ' 2>/dev/null || echo "")
          TOKEN_NAME=$(python3 -c 'import json;d=json.load(open("whoami.json"));print(d.get("name",""))' 2>/dev/null || echo "")
          echo "==> HF token belongs to: ${TOKEN_NAME} (role=${TOKEN_ROLE})"
          if [ "${TOKEN_ROLE}" != "write" ] && [ "${TOKEN_ROLE}" != "fineGrained" ]; then
            echo "::error::HF_TOKEN role is '${TOKEN_ROLE}', need 'write'."
            echo "::error::Reissue at https://huggingface.co/settings/tokens with type=write."
            exit 1
          fi

          # 2) Space の存在確認（warning のみ。Private Space は API が 404 を返すケースがあるため
          #    最終判定は後続の git push に委ねる）
          SPACE_HTTP=$(curl -sS -o space.json -w '%{http_code}' \
            -H "Authorization: Bearer ${HF_TOKEN}" \
            "https://huggingface.co/api/spaces/${SPACE_OWNER}/${HF_SPACE_NAME}" || echo 000)
          if [ "${SPACE_HTTP}" = "200" ]; then
            echo "==> Space lookup OK (HTTP 200)"
          elif [ "${SPACE_HTTP}" = "404" ]; then
            echo "::warning::Space lookup returned 404 — proceeding (Private Space で発生しうる正常系)."
            echo "::warning::もし未作成なら https://huggingface.co/new-space で作成してください。"
          else
            echo "::warning::Space lookup unexpected status (HTTP ${SPACE_HTTP}). git push で実認証します。"
            cat space.json || true
          fi

          # 3) git push 実行（verbose で実エラーを表示）
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 改行や空白混入の token を弾くため git の credential helper は無効化
          git config --global credential.helper ""
          # http.extraheader 経由でも認証可能だが、URL embed の方が単純なのでそのまま
          git add README.md
          git commit -m "ci: inject HF Spaces frontmatter" || echo "(no README changes to commit)"
          git remote remove hf 2>/dev/null || true
          git remote add hf "${HF_GIT_REMOTE}"

          # HF Spaces に強制 push（main ブランチを上書き）
          # GIT_TRACE=1 などは token を含む URL を出すため使用しない（--verbose のみ）
          if ! git push --force --verbose hf "HEAD:main" 2>&1; then
            echo "::error::git push to HF Spaces failed. See output above."
            echo "::error::Common causes: (a) token revoked between whoami and push,"
            echo "::error::                (b) protected branch on Space, (c) LFS object missing."
            exit 1
          fi
          echo "==> push succeeded: https://huggingface.co/${SPACE_PATH}"
